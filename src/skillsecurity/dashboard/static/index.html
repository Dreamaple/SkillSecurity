<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillSecurity Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2d3148;
  --text: #e4e6f0;
  --text2: #8b8fa8;
  --accent: #6c7cff;
  --green: #34d399;
  --red: #f87171;
  --orange: #fbbf24;
  --blue: #60a5fa;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 16px; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-green { background: rgba(52,211,153,.15); color: var(--green); }
.badge-red { background: rgba(248,113,113,.15); color: var(--red); }
.uptime { color: var(--text2); font-size: 13px; }

/* Stats Cards */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.stat-card .label { color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-card .value { font-size: 32px; font-weight: 700; line-height: 1; }
.stat-card .sub { color: var(--text2); font-size: 12px; margin-top: 6px; }
.v-green { color: var(--green); }
.v-red { color: var(--red); }
.v-orange { color: var(--orange); }
.v-blue { color: var(--blue); }

/* Two-column layout */
.main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
@media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

/* Panels */
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600;
}
.panel-body { padding: 0; }

/* Log table */
.log-filters {
  display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.filter-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 12px;
  transition: all .15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.log-list { max-height: 480px; overflow-y: auto; }
.log-item {
  display: grid; grid-template-columns: 70px 1fr auto;
  gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border);
  font-size: 13px; align-items: center; transition: background .1s;
}
.log-item:hover { background: var(--surface2); }
.log-action {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  text-align: center; text-transform: uppercase;
}
.action-block { background: rgba(248,113,113,.15); color: var(--red); }
.action-ask { background: rgba(251,191,36,.15); color: var(--orange); }
.action-allow { background: rgba(52,211,153,.1); color: var(--green); }
.log-reason { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-time { color: var(--text2); font-size: 11px; white-space: nowrap; }

/* Framework cards */
.fw-list { padding: 8px; }
.fw-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; margin: 4px 0; border-radius: 8px;
  background: var(--surface2); transition: background .1s;
}
.fw-card:hover { background: #2a2e3e; }
.fw-info { display: flex; align-items: center; gap: 10px; }
.fw-name { font-size: 13px; font-weight: 600; }
.fw-status {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
}
.fw-installed { color: var(--green); background: rgba(52,211,153,.1); }
.fw-missing { color: var(--text2); background: rgba(139,143,168,.1); }

.fw-toggle {
  width: 44px; height: 24px; border-radius: 12px; border: none;
  cursor: pointer; position: relative; transition: background .2s;
}
.fw-toggle.on { background: var(--green); }
.fw-toggle.off { background: var(--border); }
.fw-toggle::after {
  content: ''; position: absolute; top: 3px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: left .2s;
}
.fw-toggle.on::after { left: 23px; }
.fw-toggle.off::after { left: 3px; }
.fw-toggle:disabled { opacity: 0.3; cursor: not-allowed; }

/* Scan section */
.scan-section { padding: 16px 20px; }
.scan-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.scan-input {
  flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 13px;
}
.scan-input:focus { outline: none; border-color: var(--accent); }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.scan-result { font-size: 12px; color: var(--text2); }
.scan-result pre {
  background: var(--surface2); padding: 10px; border-radius: 8px;
  max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 11px;
}

/* Empty state */
.empty { padding: 40px; text-align: center; color: var(--text2); font-size: 13px; }

/* Severity bar */
.sev-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 12px; gap: 2px; }
.sev-bar div { border-radius: 3px; transition: width .5s; }
.sev-crit { background: var(--red); }
.sev-high { background: var(--orange); }
.sev-med { background: var(--blue); }
.sev-low { background: var(--green); }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1><span>Skill</span>Security Dashboard</h1>
    <div class="header-right">
      <span class="uptime" id="uptime"></span>
      <span class="badge badge-green" id="status-badge">Running</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total Checks</div>
      <div class="value v-blue" id="stat-total">-</div>
      <div class="sub" id="stat-period"></div>
    </div>
    <div class="stat-card">
      <div class="label">Blocked</div>
      <div class="value v-red" id="stat-block">-</div>
      <div class="sub">Dangerous operations stopped</div>
    </div>
    <div class="stat-card">
      <div class="label">Needs Confirm</div>
      <div class="value v-orange" id="stat-ask">-</div>
      <div class="sub">Requires user approval</div>
    </div>
    <div class="stat-card">
      <div class="label">Allowed</div>
      <div class="value v-green" id="stat-allow">-</div>
      <div class="sub">Safe operations passed</div>
    </div>
  </div>

  <!-- Severity bar -->
  <div class="stat-card" style="margin-bottom:28px;">
    <div class="label">Severity Distribution</div>
    <div style="display:flex;gap:16px;font-size:12px;margin-top:8px;">
      <span style="color:var(--red)">&#9679; Critical <b id="sev-crit">0</b></span>
      <span style="color:var(--orange)">&#9679; High <b id="sev-high">0</b></span>
      <span style="color:var(--blue)">&#9679; Medium <b id="sev-med">0</b></span>
      <span style="color:var(--green)">&#9679; Low <b id="sev-low">0</b></span>
    </div>
    <div class="sev-bar" id="sev-bar"></div>
  </div>

  <!-- Main layout -->
  <div class="main-grid">
    <!-- Left: Logs -->
    <div class="panel">
      <div class="panel-header">
        <span>Recent Defense Logs</span>
        <span style="font-size:12px;color:var(--text2)" id="log-count"></span>
      </div>
      <div class="log-filters">
        <button class="filter-btn active" data-action="">All</button>
        <button class="filter-btn" data-action="block">Block</button>
        <button class="filter-btn" data-action="ask">Ask</button>
        <button class="filter-btn" data-action="allow">Allow</button>
      </div>
      <div class="panel-body">
        <div class="log-list" id="log-list"></div>
      </div>
    </div>

    <!-- Right: Frameworks + Scan -->
    <div style="display:flex;flex-direction:column;gap:20px;">
      <div class="panel">
        <div class="panel-header">
          <span>Framework Protection</span>
        </div>
        <div class="panel-body">
          <div class="fw-list" id="fw-list"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span>Skill Scanner</span></div>
        <div class="panel-body">
          <div class="scan-section">
            <div class="scan-input-row">
              <input class="scan-input" id="scan-path" placeholder="Enter skill path to scan...">
              <button class="btn" id="scan-btn" onclick="doScan()">Scan</button>
            </div>
            <div class="scan-result" id="scan-result"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentFilter = '';

async function fetchJSON(url, opts) {
  const resp = await fetch(url, opts);
  return resp.json();
}

async function refreshStats() {
  const s = await fetchJSON('/api/stats');
  document.getElementById('stat-total').textContent = s.counts.total.toLocaleString();
  document.getElementById('stat-block').textContent = s.counts.block.toLocaleString();
  document.getElementById('stat-ask').textContent = s.counts.ask.toLocaleString();
  document.getElementById('stat-allow').textContent = s.counts.allow.toLocaleString();
  document.getElementById('uptime').textContent = 'Uptime: ' + s.uptime;

  const period = s.first_event ? 'Since ' + s.first_event.slice(0, 16).replace('T', ' ') : 'No events yet';
  document.getElementById('stat-period').textContent = period;

  // Severity
  document.getElementById('sev-crit').textContent = s.severity.critical;
  document.getElementById('sev-high').textContent = s.severity.high;
  document.getElementById('sev-med').textContent = s.severity.medium;
  document.getElementById('sev-low').textContent = s.severity.low;

  const total = s.severity.critical + s.severity.high + s.severity.medium + s.severity.low || 1;
  const bar = document.getElementById('sev-bar');
  bar.innerHTML = [
    ['sev-crit', s.severity.critical],
    ['sev-high', s.severity.high],
    ['sev-med', s.severity.medium],
    ['sev-low', s.severity.low],
  ].map(([cls, v]) => v > 0 ? `<div class="${cls}" style="width:${v/total*100}%"></div>` : '').join('');
}

async function refreshLogs() {
  const params = new URLSearchParams({limit: '80'});
  if (currentFilter) params.set('action', currentFilter);
  const logs = await fetchJSON('/api/logs?' + params);

  const el = document.getElementById('log-list');
  document.getElementById('log-count').textContent = logs.length + ' entries';

  if (!logs.length) {
    el.innerHTML = '<div class="empty">No log entries yet. Start using SkillSecurity to see activity here.</div>';
    return;
  }

  el.innerHTML = logs.map(e => {
    const d = e.decision || {};
    const action = d.action || '?';
    const cls = action === 'block' ? 'action-block' : action === 'ask' ? 'action-ask' : 'action-allow';
    const reason = (d.reason || '').slice(0, 80);
    const ts = (e.timestamp || '').slice(11, 19);
    return `<div class="log-item">
      <span class="log-action ${cls}">${action}</span>
      <span class="log-reason" title="${(d.reason || '').replace(/"/g, '&quot;')}">${reason}</span>
      <span class="log-time">${ts}</span>
    </div>`;
  }).join('');
}

async function refreshFrameworks() {
  const frameworks = await fetchJSON('/api/frameworks');
  const el = document.getElementById('fw-list');

  el.innerHTML = frameworks.map(fw => {
    const statusCls = fw.installed ? 'fw-installed' : 'fw-missing';
    const statusText = fw.installed ? 'Installed' : 'Not installed';
    const toggleCls = fw.protected ? 'on' : 'off';
    const disabled = !fw.installed ? 'disabled' : '';
    return `<div class="fw-card">
      <div class="fw-info">
        <div>
          <div class="fw-name">${fw.name}</div>
          <span class="fw-status ${statusCls}">${statusText}</span>
        </div>
      </div>
      <button class="fw-toggle ${toggleCls}" ${disabled}
        onclick="toggleProtect('${fw.id}', ${!fw.protected})"
        title="${fw.protected ? 'Click to unprotect' : 'Click to protect'}">
      </button>
    </div>`;
  }).join('');
}

async function toggleProtect(framework, enable) {
  const url = enable ? '/api/protect' : '/api/unprotect';
  await fetchJSON(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({framework}),
  });
  await refreshFrameworks();
  await refreshStats();
}

async function doScan() {
  const path = document.getElementById('scan-path').value.trim();
  if (!path) return;
  const btn = document.getElementById('scan-btn');
  const resultEl = document.getElementById('scan-result');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  resultEl.innerHTML = '';

  const result = await fetchJSON('/api/scan', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path}),
  });

  btn.disabled = false;
  btn.textContent = 'Scan';

  if (!result.ok) {
    resultEl.innerHTML = `<span style="color:var(--red)">Error: ${result.error}</span>`;
    return;
  }

  const risk = result.risk_level || 'unknown';
  const color = risk === 'critical' || risk === 'high' ? 'var(--red)' : risk === 'medium' ? 'var(--orange)' : 'var(--green)';
  resultEl.innerHTML = `
    <div style="margin-bottom:8px">Risk: <b style="color:${color}">${risk.toUpperCase()}</b>
    &nbsp; Files: ${result.summary?.total_files || 0}
    &nbsp; Issues: ${result.summary?.total_issues || 0}</div>
    <pre>${JSON.stringify(result.issues || [], null, 2)}</pre>`;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.action;
    refreshLogs();
  });
});

// Initial load + auto-refresh
async function refreshAll() {
  await Promise.all([refreshStats(), refreshLogs(), refreshFrameworks()]);
}
refreshAll();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
